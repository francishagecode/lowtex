name: Release

# Tag a commit `vX.Y.Z` to build downloadable binaries for macOS / Windows /
# Linux and attach them to a GitHub Release.
on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

# action-gh-release needs write access to create the release and upload assets.
permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          name="lowtex-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$name"
          bin="target/${{ matrix.target }}/release/lowtex"
          [ -f "$bin.exe" ] && cp "$bin.exe" "$name/" || cp "$bin" "$name/"
          cp README.md "$name/"
          cp -r assets "$name/" 2>/dev/null || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$name.zip" "$name"
          else
            tar czf "$name.tar.gz" "$name"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lowtex-*.tar.gz
            lowtex-*.zip
